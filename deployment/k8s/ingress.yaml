apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atmnet-ingress
  namespace: atmnet
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - atmnet.yourdomain.com
      secretName: atmnet-tls
  rules:
    - host: atmnet.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: atmnet-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: atmnet-frontend
                port:
                  number: 3000
